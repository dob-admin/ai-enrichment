[build]
builder = "NIXPACKS"

# ─── worker-loop: continuous enrichment loop ─────────────────────────────────
[[services]]
name = "worker-loop"
startCommand = "node src/workers/loop.js"

[services.restartPolicy]
type = "always"


# ─── worker-brand: brand resolution (cron every 20 minutes) ──────────────────
[[services]]
name = "worker-brand"
startCommand = "node src/workers/brandResolution.js"
cronSchedule = "*/20 * * * *"
